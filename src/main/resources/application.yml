spring:
  datasource:
    url: jdbc:mysql://localhost:3307/taxmate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: taxmate
    password: taxmate1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
